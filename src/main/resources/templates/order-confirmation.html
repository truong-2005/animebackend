<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đơn hàng</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: #f5f7fa;
        }
        .container {
            max-width: 650px;
            margin: 40px auto;
            background: #fff;
            border-radius: 10px;
        }
        .header {
            background: #4caf50;
            color: white;
            padding: 20px;
            text-align: center;
        }
        .content {
            padding: 30px;
        }
        .box {
            background: #f1f3f5;
            padding: 15px;
            border-radius: 8px;
        }
    </style>
</head>

<body>

<div class="container">

    <div class="header">
        <h2>✅ Đặt hàng thành công</h2>
    </div>

    <div class="content">
        <p>Xin chào {{name}},</p>

        <p>Mã đơn: <b>{{order_id}}</b></p>
        <p>Tổng tiền: <b>{{total}}</b> VNĐ</p>

        <div class="box">
            Cảm ơn bạn đã mua hàng!
        </div>
    </div>

</div>

</body>
</html>
