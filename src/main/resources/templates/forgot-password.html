<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quên mật khẩu</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f4f6f8;
        }
        .container {
            max-width: 600px;
            margin: 40px auto;
            background: #fff;
            border-radius: 10px;
            overflow: hidden;
        }
        .header {
            background: #ff6b6b;
            color: white;
            padding: 20px;
            text-align: center;
        }
        .content {
            padding: 30px;
            color: #333;
        }
        .btn {
            display: inline-block;
            background: #ff6b6b;
            color: white;
            padding: 12px 25px;
            text-decoration: none;
            border-radius: 6px;
            font-weight: bold;
        }
        .center {
            text-align: center;
            margin: 30px 0;
        }
    </style>
</head>

<body>

<div class="container">

    <div class="header">
        <h2>🔐 Khôi phục mật khẩu</h2>
    </div>

    <div class="content">
        <p>Xin chào,</p>

        <p>Bạn vừa yêu cầu đặt lại mật khẩu.</p>

        <div class="center">
            <a href="{{reset_link}}" class="btn">
                Đặt lại mật khẩu
            </a>
        </div>

        <p>Nếu không phải bạn, hãy bỏ qua email này.</p>

        <p>Anime Shop</p>
    </div>

</div>

</body>
</html>
